[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  CI = "false"

# Redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API redirects (if needed, but your API is on Render)
[[redirects]]
  from = "/api/*"
  to = "https://blockchain-project-rpms.onrender.com/api/:splat"
  status = 200
  force = true

# Handle 404 pages
[[redirects]]
  from = "/404.html"
  to = "/index.html"
  status = 200

# Serve static assets directly
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200
